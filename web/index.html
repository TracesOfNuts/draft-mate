<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>draft-mate — email triage</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236366f1'/%3E%3Cpath d='M7 11l9 6 9-6' stroke='white' stroke-width='2.2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='7' y='9' width='18' height='14' rx='2.5' stroke='white' stroke-width='2.2' fill='none'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28">
            <rect width="32" height="32" rx="8" fill="url(#g)" />
            <path d="M7 11l9 6 9-6" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
            <rect x="7" y="9" width="18" height="14" rx="2.5" stroke="white" stroke-width="2.2" fill="none" />
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="32" y2="32">
                <stop stop-color="#818cf8" /><stop offset="1" stop-color="#6366f1" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand-text">
          <h1>draft-mate</h1>
          <span class="tagline">local-first email triage</span>
        </div>
      </div>

      <div class="controls">
        <label class="account-select">
          <span>Account</span>
          <select id="account"></select>
        </label>
        <label class="toggle">
          <input type="checkbox" id="unread" checked />
          <span>Unread only</span>
        </label>
        <button id="triage" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.2-8.6"/><path d="M21 3v6h-6"/></svg>
          <span>Triage inbox</span>
        </button>
        <div id="status-pill" class="pill pill-muted" title="Local model status">
          <span class="dot"></span><span id="status-text">checking…</span>
        </div>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">Priority</div>
          <ul id="priority-filters" class="filter-list"></ul>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-label">Category</div>
          <ul id="category-filters" class="filter-list"></ul>
        </div>
        <div class="sidebar-foot">
          <div id="run-meta" class="run-meta"></div>
          <div class="privacy">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>Processed locally</span>
          </div>
        </div>
      </aside>

      <section class="content">
        <div class="content-head">
          <div id="counts" class="counts"></div>
          <input id="search" class="search" type="search" placeholder="Filter by sender or subject…" />
        </div>
        <div id="list" class="list"></div>
        <div id="empty" class="empty hidden">
          <div class="empty-art">📭</div>
          <p id="empty-text">No analysed emails yet.</p>
          <p class="empty-sub">Click <strong>Triage inbox</strong> to fetch and rank your mail.</p>
        </div>
      </section>
    </main>

    <!-- Email detail / draft drawer -->
    <div id="drawer-scrim" class="scrim hidden"></div>
    <aside id="drawer" class="drawer" aria-hidden="true"></aside>

    <!-- Triage progress overlay -->
    <div id="overlay" class="overlay hidden">
      <div class="overlay-card">
        <div class="spinner"></div>
        <div id="overlay-title" class="overlay-title">Analysing inbox…</div>
        <div class="progress"><div id="progress-bar" class="progress-bar"></div></div>
        <div id="overlay-sub" class="overlay-sub"></div>
      </div>
    </div>

    <div id="toasts" class="toasts"></div>

    <script src="/app.js"></script>
  </body>
</html>
